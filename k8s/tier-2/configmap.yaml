apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-gateway-config
  namespace: observability
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: "0.0.0.0:4317"

    connectors:
      spanmetrics:
        namespace: jenkins.ci
        dimensions:
          - name: cicd.pipeline.name
          - name: cicd.pipeline.task.type
          - name: jenkins.pipeline.step.type
        histogram:
          explicit:
            buckets: [1000, 5000, 10000, 30000, 60000, 120000, 300000, 600000]
        exemplars:
          enabled: true

    processors:
      memory_limiter:
        check_interval: 5s
        limit_mib: 1500
        spike_limit_mib: 400
      batch:
        timeout: 5s
        send_batch_size: 512
      tail_sampling:
        decision_wait: 30s
        num_traces: 10000
        policies:
          - name: errors-keep
            type: status_code
            status_code:
              status_codes: [ERROR]
          - name: slow-traces-keep
            type: latency
            latency:
              threshold_ms: 60000
          - name: baseline-sample
            type: probabilistic
            probabilistic:
              sampling_percentage: 20
      resource:
        attributes:
          - key: deployment.environment
            value: poc-k8s
            action: upsert

    exporters:
      otlp/jaeger:
        endpoint: "jaeger.monitoring.svc.cluster.local:4317"
        tls:
          insecure: true
      prometheus:
        endpoint: "0.0.0.0:8889"
        resource_to_telemetry_conversion:
          enabled: true
      debug:
        verbosity: basic

    extensions:
      health_check:
        endpoint: "0.0.0.0:13133"

    service:
      extensions: [health_check]
      telemetry:
        metrics:
          address: "0.0.0.0:8888"
      pipelines:
        traces/metrics:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [spanmetrics]
        traces/sampling:
          receivers: [otlp]
          processors: [memory_limiter, batch, tail_sampling]
          exporters: [otlp/jaeger, debug]
        metrics:
          receivers: [spanmetrics, otlp]
          processors: [memory_limiter, batch, resource]
          exporters: [prometheus]
        logs:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [debug]